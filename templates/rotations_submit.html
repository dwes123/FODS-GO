{{define "title"}}Submit Rotation{{end}}

{{define "content"}}
<div class="rotation-submit-header">
    <h2>Submit Weekly Rotation</h2>
    <div class="week-nav">
        <a href="/rotations/submit?week={{.PrevWeek}}" class="button button-small">&laquo; Prev</a>
        <span class="week-label">Week {{.SelectedWeek}} ({{.WeekStart}} – {{.WeekEnd}})</span>
        <a href="/rotations/submit?week={{.NextWeek}}" class="button button-small">Next &raquo;</a>
    </div>
</div>

<div class="form-group" style="max-width:400px;margin-bottom:20px;">
    <label>Select Team:</label>
    <select id="team_select" required onchange="loadTeamData()">
        <option value="">-- Choose a Team --</option>
        {{range .MyTeams}}
        <option value="{{.ID}}">{{.Name}}</option>
        {{end}}
    </select>
</div>

<div id="loading" style="display:none;">Loading roster...</div>

<div id="rotation_form" style="display:none;">
    <div class="rotation-week-grid">
        {{range .Days}}
        <div class="day-column" data-day="{{.}}">
            <h4 class="day-header">{{.}}</h4>
            <div class="day-date"></div>
            <input type="hidden" name="{{.}}_p1_date" class="p1-date">
            <input type="hidden" name="{{.}}_p2_date" class="p2-date">
            <div class="pitcher-slot">
                <label>Active Starter:</label>
                <select class="p1-select pitcher-select" name="{{.}}_p1_id">
                    <option value="">-- None --</option>
                </select>
            </div>
            <div class="pitcher-slot banked-slot">
                <label>Banked Pitcher:</label>
                <select class="p2-select pitcher-select" name="{{.}}_p2_id">
                    <option value="">-- None --</option>
                </select>
            </div>
        </div>
        {{end}}
    </div>

    <div id="submit-area" style="margin-top:20px;">
        <button type="button" class="button button-primary" onclick="submitRotation()">Save Rotation</button>
        <span id="submit-status" style="margin-left:15px;"></span>
    </div>
</div>

<script>
let pitchers = [];

// Compute dates for each day from the week identifier (YYYY-WW)
function computeWeekDates(weekStr) {
    const parts = weekStr.split('-');
    const year = parseInt(parts[0]);
    const week = parseInt(parts[1]);

    // ISO week: Jan 4 is always in week 1. Find Monday of week 1, then offset.
    const jan4 = new Date(year, 0, 4);
    const dayOfWeek = jan4.getDay() || 7; // Convert Sunday=0 to 7
    const week1Monday = new Date(jan4);
    week1Monday.setDate(jan4.getDate() - dayOfWeek + 1);

    const dates = {};
    const dayNames = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    dayNames.forEach((day, i) => {
        const d = new Date(week1Monday);
        d.setDate(week1Monday.getDate() + (week - 1) * 7 + i);
        dates[day] = d;
    });
    return dates;
}

function formatDateDisplay(d) {
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateISO(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

const weekDates = computeWeekDates('{{.SelectedWeek}}');

// Set date labels and hidden field values
document.querySelectorAll('.day-column').forEach(col => {
    const day = col.dataset.day;
    const date = weekDates[day];
    if (date) {
        col.querySelector('.day-date').textContent = formatDateDisplay(date);
        const isoDate = formatDateISO(date);
        col.querySelector('.p1-date').value = isoDate;
        col.querySelector('.p2-date').value = isoDate;
    }
});

async function loadTeamData() {
    const teamID = document.getElementById('team_select').value;
    if (!teamID) {
        document.getElementById('rotation_form').style.display = 'none';
        return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('rotation_form').style.display = 'none';

    try {
        const pitcherRes = await fetch(`/api/team/pitchers?team_id=${teamID}`);
        pitchers = await pitcherRes.json();

        document.querySelectorAll('.pitcher-select').forEach(sel => {
            sel.innerHTML = '<option value="">-- None --</option>';
            pitchers.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.first_name} ${p.last_name} (${p.position})`;
                sel.appendChild(opt);
            });
        });

        // Load existing rotation data for this team+week
        const rotRes = await fetch(`/api/team/rotation?team_id=${teamID}&week={{.SelectedWeek}}`);
        const existing = await rotRes.json();

        const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
        days.forEach(day => {
            const col = document.querySelector(`.day-column[data-day="${day}"]`);
            const entry = existing[day];
            if (entry) {
                col.querySelector('.p1-select').value = entry.p1_id || '';
                col.querySelector('.p2-select').value = entry.p2_id || '';
            } else {
                col.querySelector('.p1-select').value = '';
                col.querySelector('.p2-select').value = '';
            }
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('rotation_form').style.display = 'block';
    } catch (e) {
        document.getElementById('loading').style.display = 'none';
        alert('Failed to load data: ' + e.message);
    }
}

async function submitRotation() {
    const teamID = document.getElementById('team_select').value;
    if (!teamID) { alert('Select a team first'); return; }

    const formData = new FormData();
    formData.append('team_id', teamID);
    formData.append('week', '{{.SelectedWeek}}');

    const days = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    days.forEach(day => {
        const col = document.querySelector(`.day-column[data-day="${day}"]`);
        formData.append(day + '_p1_id', col.querySelector('.p1-select').value);
        formData.append(day + '_p1_date', col.querySelector('.p1-date').value);
        formData.append(day + '_p2_id', col.querySelector('.p2-select').value);
        formData.append(day + '_p2_date', col.querySelector('.p2-date').value);
    });

    const status = document.getElementById('submit-status');
    status.textContent = 'Saving...';
    status.style.color = '#666';

    try {
        const res = await fetch('/rotations/save', { method: 'POST', body: formData });
        const json = await res.json();
        if (res.ok) {
            status.textContent = 'Rotation saved!';
            status.style.color = 'green';
        } else {
            status.textContent = 'Error: ' + json.error;
            status.style.color = 'red';
        }
    } catch (e) {
        status.textContent = 'Request failed';
        status.style.color = 'red';
    }
}
</script>

<style>
    .rotation-submit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .week-nav { display: flex; align-items: center; gap: 10px; }
    .week-label { font-weight: bold; font-size: 1.1rem; }
    .rotation-week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .day-column { background: var(--card-bg, #fff); border: 1px solid var(--border-color, #ddd); border-radius: 8px; padding: 12px; }
    .day-header { text-transform: capitalize; margin: 0 0 2px 0; text-align: center; color: var(--fod-blue-primary); border-bottom: 2px solid var(--fod-blue-primary); padding-bottom: 6px; }
    .day-date { text-align: center; font-size: 0.85rem; color: #666; margin-bottom: 10px; font-weight: 600; }
    .pitcher-slot { margin-bottom: 12px; }
    .pitcher-slot label { display: block; font-weight: 600; font-size: 0.8rem; margin-bottom: 4px; color: #555; }
    .pitcher-slot select { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
    .banked-slot { background: var(--banked-bg, #f0f7ff); padding: 8px; border-radius: 6px; border: 1px dashed #bcd; }
    #submit-status { font-weight: bold; }

    @media (max-width: 1200px) {
        .rotation-week-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
        .rotation-week-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
        .rotation-week-grid { grid-template-columns: 1fr; }
    }
</style>
{{end}}
